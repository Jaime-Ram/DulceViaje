<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bondivideo — Transporte público en Montevideo</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0055B3;
      color: white;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
      text-align: center;
    }
    h1 { font-size: 3rem; font-weight: 800; letter-spacing: -1px; }
    .yellow { color: #F5C800; }
    p { margin-top: 16px; font-size: 1.2rem; opacity: 0.85; max-width: 480px; }
    .links { margin-top: 48px; display: flex; gap: 24px; flex-wrap: wrap; justify-content: center; }
    a {
      color: #F5C800;
      text-decoration: none;
      font-weight: 600;
      font-size: 1rem;
      border: 2px solid #F5C800;
      padding: 12px 28px;
      border-radius: 100px;
      transition: background 0.2s;
    }
    a:hover { background: rgba(245,200,0,0.15); }
    .badge { margin-top: 64px; opacity: 0.5; font-size: 0.8rem; }
  </style>
</head>
<body>
  <h1>Bondi<span class="yellow">video</span></h1>
  <p>
    La app de transporte público para Montevideo. Horarios en tiempo real,
    planificación de viajes y mapas del STM.
  </p>
  <div class="links">
    <a href="#">App Store (próximamente)</a>
    <a href="#">Google Play (próximamente)</a>
    <a href="privacy.html">Política de privacidad</a>
  </div>
  <p class="badge">© 2026 Bondivideo · Montevideo, Uruguay</p>
</body>
</html>
